<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramientas de Cálculo - BME</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>

    <style>
        :root { --azul-ing: #003366; }
        .navbar { background-color: var(--azul-ing) !important; }
        .card-tool { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .console { 
            background: #1a1a1a; 
            color: #39ff14; 
            font-family: 'Consolas', 'Courier New', monospace; 
            padding: 15px; 
            border-radius: 8px; 
            min-height: 100px;
            white-space: pre-wrap;
        }
        .btn-calc { font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">BME - Ing. Química</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="equipo.html">Equipo Docente</a></li>
                    <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="alumnos.html">Alumnos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="herramientas.html">Herramientas</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-5 fw-bold" style="color: var(--azul-ing);">Laboratorio de Cálculo Instantáneo</h2>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card card-tool p-4">
                    <h4 class="fw-bold mb-3 text-primary text-center">📊 Balance de Masa ($Ax = B$)</h4>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Matriz A (Filas separadas por ";"):</label>
                        <input type="text" id="inputA" class="form-control form-control-lg" placeholder="1 1; 1 -1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Vector B (Resultados):</label>
                        <input type="text" id="inputB" class="form-control form-control-lg" placeholder="10; 2">
                    </div>
                    <button onclick="resolverLineal()" class="btn btn-primary btn-calc w-100 py-2">Calcular Balances</button>
                    
                    <div class="mt-4">
                        <div id="outLineal" class="console">> Ingrese datos...</div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card card-tool p-4 border-top border-4 border-danger">
                    <h4 class="fw-bold mb-3 text-danger text-center">🔥 Propiedades del Vapor</h4>
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label small fw-bold text-secondary">Presión (bar):</label>
                            <input type="number" id="p_val" class="form-control" value="1.013">
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold text-secondary">Temp (°C):</label>
                            <input type="number" id="t_val" class="form-control" value="100">
                        </div>
                    </div>
                    <button onclick="calcularVapor()" class="btn btn-danger btn-calc w-100 py-2">Obtener Propiedades</button>
                    
                    <div class="mt-4">
                        <div id="outVapor" class="console">> Sistema listo.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Función para Sistemas de Ecuaciones
        function resolverLineal() {
            try {
                const aRaw = document.getElementById('inputA').value;
                const bRaw = document.getElementById('inputB').value;

                // Formateo de Matriz A
                const A = aRaw.split(';').map(row => row.trim().split(/\s+/).map(Number));
                // Formateo de Vector B
                const B = bRaw.split(';').map(Number);

                const x = math.lusolve(A, B);
                const sol = [].concat(...x);

                let res = "SOLUCIÓN DEL SISTEMA:\n====================\n";
                sol.forEach((v, i) => {
                    res += `Corriente/Incógnita x${i+1} = ${v.toFixed(4)}\n`;
                });
                document.getElementById('outLineal').innerText = res;
            } catch (err) {
                document.getElementById('outLineal').innerText = "ERROR: Verifique el formato.\nEj: A -> 1 1; 1 -1\n    B -> 10; 2";
            }
        }

        // Función para Termodinámica (JavaScript Puro)
        function calcularVapor() {
            const P = parseFloat(document.getElementById('p_val').value);
            const T = parseFloat(document.getElementById('t_val').value);

            if (isNaN(P) || isNaN(T)) {
                document.getElementById('outVapor').innerText = "Error: Ingrese valores numéricos.";
                return;
            }

            // Lógica de cálculo (fórmulas de la cátedra)
            // Ejemplo de cálculo de entalpía para vapor de agua (aproximación)
            const h_vap = (2501 + (1.82 * T)).toFixed(2);
            const h_liq = (4.18 * T).toFixed(2);

            let res = "REPORTE TERMODINÁMICO:\n====================\n";
            res += `P: ${P} bar | T: ${T} °C\n\n`;
            res += `H (Vapor est.): ${h_vap} kJ/kg\n`;
            res += `H (Líq. est.):  ${h_liq} kJ/kg\n`;
            res += `\nEstado: Basado en cálculos de regresión lineal.`;

            document.getElementById('outVapor').innerText = res;
        }
    </script>

    <footer class="text-center py-4 text-muted border-top mt-5 bg-white">
        <small>Cátedra Balances de Materia y Energía - Herramientas Digitales © 2024</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
